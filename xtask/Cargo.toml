[package]
name = "xtask"
version = "0.1.0"
edition = "2021"
publish = false

# xtask builds on the host; std is available.
[[bin]]
name = "xtask"
path = "src/main.rs"
test = false

[dependencies]
# Declarative CLI with auto-generated help text.
clap = { version = "4", features = ["derive"] }
# Ergonomic error propagation with .context().
anyhow = "1"

[lints]
workspace = true
